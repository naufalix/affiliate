<!doctype html>
<html lang="id" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["Inter", "sans-serif"]
          },
          colors: {
            primary: {
              50: "#eef2ff",
              100: "#e0e7ff",
              500: "#6366f1",
              600: "#4f46e5",
              700: "#4338ca",
              800: "#3730a3",
              900: "#312e81"
            },
            secondary: {
              50: "#f0fdfa",
              500: "#14b8a6",
              600: "#0d9488",
              900: "#134e4a"
            },
            accent: {
              500: "#f59e0b",
              600: "#d97706"
            },
            slate: {
              850: "#1e293b"
            }
          },
          animation: {
            blob: "blob 7s infinite"
          },
          keyframes: {
            blob: {
              "0%": { transform: "translate(0px, 0px) scale(1)" },
              "33%": { transform: "translate(30px, -50px) scale(1.1)" },
              "66%": { transform: "translate(-20px, 20px) scale(0.9)" },
              "100%": { transform: "translate(0px, 0px) scale(1)" }
            }
          }
        }
      }
    };
  </script>
  <link rel="stylesheet" href="assets/css/tailwind-prototype.css">
</head>
<body class="relative min-h-screen bg-slate-50 text-slate-700">
  <div class="pointer-events-none fixed inset-0 -z-10 overflow-hidden">
    <div class="absolute -left-24 -top-20 h-80 w-80 rounded-full bg-primary-200/70 blur-3xl animate-blob"></div>
    <div class="absolute -bottom-24 -right-16 h-80 w-80 rounded-full bg-secondary-200/70 blur-3xl animate-blob"></div>
  </div>

  <div id="app-header"></div>

  <main id="checkoutPage" class="mx-auto w-full max-w-7xl px-4 py-14 sm:px-6 lg:px-8 lg:py-20">
    <div id="checkoutReferral" class="glass mb-6 rounded-2xl border border-primary-100 px-4 py-3 text-sm font-medium text-primary-800 shadow-sm">
      Order ini terkait referral <strong>AHMAD2026</strong> dari affiliator: Ahmad Setiawan
    </div>

    <p class="text-xs font-extrabold uppercase tracking-[0.2em] text-primary-600">Checkout Flow</p>
    <h1 class="mt-3 text-4xl font-extrabold leading-tight text-slate-900 md:text-5xl">Checkout Pembelian</h1>
    <p class="mt-4 max-w-3xl text-lg leading-relaxed text-slate-600">Isi data pelanggan dengan benar, lalu verifikasi rincian tagihan sebelum proses pembayaran.</p>

    <form action="checkout-success.html" method="GET" class="mt-8 grid gap-8 lg:grid-cols-12">
      <section id="customerForm" class="panel-card glass hover-lift rounded-3xl border border-white/60 p-6 sm:p-8 lg:col-span-7">
        <h2 class="text-2xl font-bold leading-tight text-slate-900">Data Pelanggan</h2>
        <div class="mt-4 space-y-3">
          <div>
            <label class="mb-1.5 block text-sm font-semibold text-slate-700">Nama Lengkap</label>
            <input class="w-full rounded-xl border border-slate-200 bg-white px-4 py-3.5 text-sm text-slate-900 focus:border-primary-500 focus:outline-none focus:ring-2 focus:ring-primary-200" required>
          </div>
          <div>
            <label class="mb-1.5 block text-sm font-semibold text-slate-700">Email</label>
            <input type="email" class="w-full rounded-xl border border-slate-200 bg-white px-4 py-3.5 text-sm text-slate-900 focus:border-primary-500 focus:outline-none focus:ring-2 focus:ring-primary-200" required>
          </div>
          <div>
            <label class="mb-1.5 block text-sm font-semibold text-slate-700">Nomor WhatsApp</label>
            <input class="w-full rounded-xl border border-slate-200 bg-white px-4 py-3.5 text-sm text-slate-900 focus:border-primary-500 focus:outline-none focus:ring-2 focus:ring-primary-200" required>
          </div>
        </div>
      </section>

      <aside id="paymentSummary" class="panel-card glass hover-lift rounded-3xl border border-white/60 p-6 sm:p-8 lg:col-span-5">
        <h2 class="text-2xl font-bold leading-tight text-slate-900">Ringkasan Pembayaran</h2>
        <div class="mt-5 space-y-3 text-base">
          <div class="flex items-center justify-between"><span class="text-slate-600">Kelas Reguler AMC</span><span class="font-semibold text-slate-900">Rp 4.500.000</span></div>
          <div class="flex items-center justify-between border-t border-slate-100 pt-3 text-lg"><strong class="text-slate-900">Total</strong><strong class="text-primary-600">Rp 4.500.000</strong></div>
        </div>
        <button id="payNowBtn" type="submit" class="ripple mt-6 inline-flex w-full items-center justify-center rounded-full bg-primary-600 px-6 py-3.5 text-base font-bold text-white shadow-lg shadow-primary-500/30 transition hover:-translate-y-0.5 hover:bg-primary-700">Proses Pembayaran</button>
      </aside>
    </form>
  </main>

  <div id="app-footer"></div>

  <button id="tourStartBtn" class="tour-fab ripple inline-flex items-center gap-2 rounded-full bg-primary-600 px-4 py-2.5 text-sm font-bold text-white shadow-lg shadow-primary-500/30 hover:bg-primary-700">
    <i data-lucide="signpost" class="h-4 w-4"></i>
    Mulai Tur Alur Checkout
  </button>

  <script src="assets/js/dynamic-layout.js"></script>
  <script>
    window.affiliateTourConfig = {
      flow: "store-checkout",
      steps: [
        { selector: "#checkoutReferral", title: "Referral Terhubung", content: "Sistem menampilkan bahwa order ini terkait kode referral affiliator." },
        { selector: "#customerForm", title: "Form Pelanggan", content: "Pembeli mengisi data yang dipakai untuk invoice dan komunikasi setelah pembayaran." },
        { selector: "#paymentSummary", title: "Ringkasan Tagihan", content: "Bagian ini menampilkan komponen nilai transaksi akhir." },
        { selector: "#payNowBtn", title: "Aksi Pembayaran", content: "Klik tombol ini untuk meneruskan proses ke payment gateway.", nextPage: "checkout-success.html", nextFlow: "store-checkout-success", nextIndex: 0 }
      ]
    };
  </script>
  <script>lucide.createIcons();</script>
  <script src="assets/js/affiliate-tour.js"></script>
</body>
</html>
