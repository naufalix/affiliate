<!doctype html>
<html lang="id" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profil Affiliate</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ["Inter", "sans-serif"] },
          colors: {
            primary: { 50: "#eef2ff", 100: "#e0e7ff", 500: "#6366f1", 600: "#4f46e5", 700: "#4338ca", 800: "#3730a3", 900: "#312e81" },
            secondary: { 50: "#f0fdfa", 500: "#14b8a6", 600: "#0d9488", 900: "#134e4a" },
            accent: { 500: "#f59e0b", 600: "#d97706" },
            slate: { 850: "#1e293b" }
          },
          animation: { blob: "blob 7s infinite" },
          keyframes: {
            blob: {
              "0%": { transform: "translate(0px, 0px) scale(1)" },
              "33%": { transform: "translate(30px, -50px) scale(1.1)" },
              "66%": { transform: "translate(-20px, 20px) scale(0.9)" },
              "100%": { transform: "translate(0px, 0px) scale(1)" }
            }
          }
        }
      }
    };
  </script>
  <link rel="stylesheet" href="assets/css/tailwind-prototype.css">
</head>
<body class="relative min-h-screen bg-slate-50 text-slate-700">
  <div class="pointer-events-none fixed inset-0 -z-10 overflow-hidden">
    <div class="absolute -left-24 -top-20 h-80 w-80 rounded-full bg-primary-200/70 blur-3xl animate-blob"></div>
    <div class="absolute -bottom-24 -right-16 h-80 w-80 rounded-full bg-secondary-200/70 blur-3xl animate-blob"></div>
  </div>

  <div class="app-layout">
    <aside class="app-sidebar hidden flex-col p-4 lg:flex">
      <a href="dashboard-peserta.html" class="mb-4 inline-flex items-center gap-2 text-base font-extrabold text-slate-900">
        <span class="inline-flex h-9 w-9 items-center justify-center rounded-xl bg-primary-600 text-white shadow-lg shadow-primary-500/30"><i data-lucide="network" class="h-4 w-4"></i></span>
        Affiliate Panel
      </a>
      <nav class="grid gap-1">
        <a class="nav-pill" href="dashboard-peserta.html">Dashboard</a>
        <a class="nav-pill" href="affiliator-links.html">Link Referral</a>
        <a class="nav-pill" href="affiliator-commissions.html">Statistik Komisi</a>
        <a class="nav-pill" href="affiliator-withdrawals.html">Penarikan Dana</a>
        <a class="nav-pill" href="affiliator-marketing.html">Materi Marketing</a>
        <a class="nav-pill" href="affiliator-leaderboard.html">Leaderboard</a>
        <a class="nav-pill active" href="affiliator-profile.html">Profil Akun</a>
      </nav>
    </aside>

    <div class="app-main">
      <header class="app-topbar flex items-center justify-between px-4 py-3 sm:px-6">
        <strong id="profileHeader" class="text-slate-900">Profil dan Keamanan Akun</strong>
        <span class="text-sm">Ahmad Setiawan</span>
      </header>

      <main class="p-4 sm:p-6">
        <div id="verifiedInfo" class="page-hero rounded-2xl px-4 py-3 text-sm font-medium">Status akun: Verified Alumni. Pastikan data rekening selalu aktif untuk penarikan dana.</div>

        <div class="mt-4 grid gap-3 lg:grid-cols-2">
          <section id="personalForm" class="panel-card p-4">
            <h2 class="text-base font-bold text-slate-900">Data Personal</h2>
            <div class="mt-3 space-y-3">
              <div><label class="mb-1.5 block text-sm font-semibold text-slate-700">Nama Lengkap</label><input class="w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm" value="Ahmad Setiawan"></div>
              <div><label class="mb-1.5 block text-sm font-semibold text-slate-700">Email</label><input class="w-full cursor-not-allowed rounded-xl border border-slate-200 bg-slate-100 px-4 py-3 text-sm text-slate-500" value="ahmad@email.com" disabled></div>
              <div><label class="mb-1.5 block text-sm font-semibold text-slate-700">WhatsApp</label><input class="w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm" value="081234567890"></div>
              <button class="ripple inline-flex items-center justify-center rounded-xl bg-primary-600 px-4 py-2.5 text-sm font-bold text-white shadow-lg shadow-primary-500/30">Simpan Data</button>
            </div>
          </section>

          <section id="bankForm" class="panel-card p-4">
            <h2 class="text-base font-bold text-slate-900">Rekening Pencairan</h2>
            <div class="mt-3 space-y-3">
              <div><label class="mb-1.5 block text-sm font-semibold text-slate-700">Bank</label><select class="w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm"><option>BCA</option><option>Mandiri</option></select></div>
              <div><label class="mb-1.5 block text-sm font-semibold text-slate-700">Nomor Rekening</label><input class="w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm" value="0918273645"></div>
              <div><label class="mb-1.5 block text-sm font-semibold text-slate-700">Atas Nama</label><input class="w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm" value="Ahmad Setiawan"></div>
              <button class="ripple inline-flex items-center justify-center rounded-xl border border-primary-200 bg-primary-50 px-4 py-2.5 text-sm font-bold text-primary-700">Update Rekening</button>
            </div>
          </section>
        </div>

        <section id="passwordForm" class="panel-card mt-4 p-4">
          <h2 class="text-base font-bold text-slate-900">Keamanan Password</h2>
          <div class="mt-3 grid gap-3 md:grid-cols-3">
            <input class="w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm" placeholder="Password saat ini" type="password">
            <input class="w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm" placeholder="Password baru" type="password">
            <input class="w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm" placeholder="Konfirmasi" type="password">
          </div>
          <button class="ripple mt-3 inline-flex items-center justify-center rounded-xl bg-primary-600 px-4 py-2.5 text-sm font-bold text-white shadow-lg shadow-primary-500/30">Ubah Password</button>
        </section>
      </main>
    </div>
  </div>

  <button id="tourStartBtn" class="tour-fab ripple inline-flex items-center gap-2 rounded-full bg-primary-600 px-4 py-2.5 text-sm font-bold text-white shadow-lg shadow-primary-500/30 hover:bg-primary-700">
    <i data-lucide="signpost" class="h-4 w-4"></i>
    Mulai Tur Alur Lengkap
  </button>

  <script>
    window.affiliateTourConfig = {
      flow: "aff-profile",
      steps: [
        { selector: "#profileHeader", title: "Halaman Profil", content: "Halaman ini digunakan untuk mengelola data akun affiliator." },
        { selector: "#verifiedInfo", title: "Status Verifikasi", content: "Status akun ditampilkan agar user tahu hak akses dan prioritas komisinya." },
        { selector: "#personalForm", title: "Data Personal", content: "Perbarui informasi kontak untuk notifikasi operasional affiliate." },
        { selector: "#bankForm", title: "Data Rekening", content: "Data rekening harus valid karena dipakai pada proses pencairan." },
        { selector: "#passwordForm", title: "Keamanan Password", content: "Rutin memperbarui password membantu menjaga keamanan akun affiliate.", nextPage: "admin.html", nextFlow: "admin-affiliate", nextIndex: 0 }
      ]
    };
  </script>
  <script>lucide.createIcons();</script>
  <script src="assets/js/affiliate-tour.js"></script>
</body>
</html>
